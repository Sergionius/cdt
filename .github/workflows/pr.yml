name: PR

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dev dependencies
        run: python -m pip install -e '.[dev]'

      - name: Ruff
        run: ruff check .

      - name: Tests
        run: pytest -q

      - name: Build
        run: python -m build

      - name: Twine check
        run: twine check dist/*

      - name: Smoke test built wheel
        run: |
          python -m venv /tmp/cdt-smoke
          /tmp/cdt-smoke/bin/python -m pip install dist/*.whl
          /tmp/cdt-smoke/bin/cdt --version
          /tmp/cdt-smoke/bin/cdt --help
