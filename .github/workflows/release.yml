name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dev dependencies
        run: python -m pip install -e '.[dev]'

      - name: Ruff
        run: ruff check .

      - name: Tests
        run: pytest -q

      - name: Build
        run: |
          rm -rf dist
          python -m build

      - name: Twine check
        run: twine check dist/*

      - name: Publish cdt-release to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum *.whl *.tar.gz > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
          body: |
            Release ${{ github.ref_name }}.

            Built and checked by GitHub Actions. See CHANGELOG.md for details.

  github-tag-smoke:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install from GitHub tag and smoke test
        run: |
          python -m venv /tmp/cdt-tag-smoke
          for attempt in 1 2 3; do
            if /tmp/cdt-tag-smoke/bin/python -m pip install 'git+https://github.com/Sergionius/cdt.git@${{ github.ref_name }}'; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep 10
          done
          /tmp/cdt-tag-smoke/bin/cdt --version
