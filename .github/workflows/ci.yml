name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: python -m pip install -e '.[dev]'

      - name: Ruff
        run: python -m ruff check .

      - name: Compile
        run: python -m compileall cdt tests

      - name: Test
        run: python -m pytest -q

      - name: Build
        run: python -m build

      - name: Twine check
        run: python -m twine check dist/*

      - name: CLI smoke
        run: |
          python -m cdt.cli --version
          python -m cdt.cli --help
          python -m cdt.cli run --help
          python -m cdt.cli pipeline --help
          python -m cdt.cli pipeline steps --help
          python -m cdt.cli migrate --help
          python -m cdt.cli migrate legacy --help
